<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tools · camoufly</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.11);
    --text: #efefef;
    --muted: #555;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.07);
    --accent-border: rgba(200,240,96,0.18);
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none;
    z-index: 0;
  }
  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px; border-bottom: 0.5px solid var(--border); }
  .wordmark { font-family: var(--mono); font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .wordmark span { color: var(--accent); }
  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
  .eyebrow { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; border: 0.5px solid var(--border2); padding: 5px 14px; border-radius: 100px; margin-bottom: 40px; }
  .title { font-size: 32px; font-weight: 600; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
  .title span { color: var(--accent); }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 48px; text-align: center; }
  .card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; padding: 28px 32px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 18px; }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .btn-google { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 13px 20px; background: #fff; color: #1f1f1f; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.15s, transform 0.1s; font-family: inherit; }
  .btn-google:hover { background: #f2f2f2; }
  .btn-google:active { transform: scale(0.98); }
  .btn-google.loading { background: #e8e8e8; pointer-events: none; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  .btn-google .spinner { display: none; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .btn-google.loading .spinner { display: block; }
  .btn-google.loading .g-icon { display: none; }
  .btn-google.loading .btn-text { color: #999; }
  .divider { height: 0.5px; background: var(--border); }
  .note { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .note strong { color: #4a4a4a; font-weight: 500; }
  .footer { padding: 20px 28px; border-top: 0.5px solid var(--border); font-family: var(--mono); font-size: 11px; color: #2a2a2a; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="wordmark">tools · <span>camoufly</span></div>
  </div>
  <div class="center">
    <div class="eyebrow">internal tools</div>
    <div class="title">camoufly <span>tools</span></div>
    <div class="sub">Sign in to access your workspace</div>
    <div class="card">
      <div class="card-label">Sign in to continue</div>
      <button class="btn-google" id="signin-btn" onclick="handleSignIn()">
        <svg class="g-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        <div class="spinner"></div>
        <span class="btn-text">Continue with Google</span>
      </button>
      <div class="divider"></div>
      <div class="note">Access restricted to authorised accounts —<br><strong>camoufly.me</strong> and <strong>ctrlfrk.co.uk</strong>.</div>
    </div>
  </div>
  <div class="footer">tools.camoufly.me</div>
</div>
<script>
  function handleSignIn() {
    const btn = document.getElementById('signin-btn');
    btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Signing in...';
    setTimeout(() => { window.location.href = '/hub.html'; }, 500);
  }
</script>
</body>
</html>
