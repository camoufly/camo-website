<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="camoufly — tour">
  <meta name="keywords" content="camoufly, music">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">

  <meta property="og:site_name" content="camoufly" />
  <meta property="og:title" content="camoufly – tour dates" />
  <meta property="og:description" content="camo's next stops" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="http://camoufly.me/" />
  <meta property="og:image" content="http://camoufly.me/image2.jpg" />

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="camoufly – tour dates">
  <meta name="twitter:description" content="camo's next stops">
  <meta name="twitter:image" content="http://camoufly.me/image2.jpg">

  <link rel="icon" href="thumbnail_logo.png">
  <title>camoufly — tour</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Sans:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Instrument Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: grab;
    }

    body:active { cursor: grabbing; }

    #globe-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .brand {
      position: fixed;
      top: 24px; left: 28px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .brand .logo {
      height: 28px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .brand .logoalt {
      height: 16px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.5;
    }

    .back-link {
      position: fixed;
      top: 28px; right: 28px;
      z-index: 100;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }

    /* Tooltip / Popup */
    .pin-tooltip {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      font-family: 'Space Mono', monospace;
    }

    .pin-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .pin-tooltip-inner {
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 220px;
      max-width: 300px;
    }

    .pin-tooltip .tt-date {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #e74c3c;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .pin-tooltip .tt-venue {
      font-size: 13px;
      color: #fff;
      margin-bottom: 2px;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 600;
    }

    .pin-tooltip .tt-city {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
    }

    .pin-tooltip .tt-btn {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      background: #e74c3c;
      border: none;
      border-radius: 5px;
      padding: 8px 16px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pin-tooltip .tt-btn:hover {
      background: #c0392b;
    }

    /* Date list sidebar */
    .date-list {
      position: fixed;
      bottom: 28px; left: 28px;
      z-index: 100;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date-list li {
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-list li:hover, .date-list li.active {
      color: #fff;
    }

    .date-list li::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #e74c3c;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Footer */
    .globe-footer {
      position: fixed;
      bottom: 24px; right: 28px;
      z-index: 100;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .globe-footer a {
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .globe-footer a:hover { opacity: 0.8; }
    .globe-footer a img {
      width: 18px; height: 18px;
      filter: brightness(0) invert(1);
    }

    /* Loading */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      transition: opacity 0.8s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Mobile */
    @media (max-width: 640px) {
      .date-list { display: none; }
      .globe-footer { display: none; }
      .brand .logo { height: 22px; }
    }
  </style>
</head>
<body>

  <div id="loading">Loading globe…</div>

  <div id="globe-container"></div>

  <header class="brand">
    <a href="https://camoufly.me/" aria-label="Home">
      <img src="/images/logo.png" alt="camoufly" class="logo">
    </a>
    <img src="/images/ontour.png" alt="Tour" class="logoalt">
  </header>

  <a href="/" class="back-link">← Back</a>

  <ul class="date-list" id="dateList"></ul>

  <div class="pin-tooltip" id="tooltip">
    <div class="pin-tooltip-inner">
      <div class="tt-date" id="ttDate"></div>
      <div class="tt-venue" id="ttVenue"></div>
      <div class="tt-city" id="ttCity"></div>
      <a class="tt-btn" id="ttBtn" href="#" target="_blank" rel="noopener noreferrer">Tickets →</a>
    </div>
  </div>

  <div class="globe-footer">
    <a href="http://instagram.com/camouflybeats" target="_blank" rel="noopener noreferrer"><img src="https://raw.githubusercontent.com/camoufly/camo-website/main/images/instagram.png" alt="Instagram"></a>
    <a href="http://soundcloud.com/camouflybeats" target="_blank" rel="noopener noreferrer"><img src="https://raw.githubusercontent.com/camoufly/camo-website/main/images/soundcloud.png" alt="SoundCloud"></a>
    <a href="https://open.spotify.com/artist/6ZmJg6NCjGmRgC2GEI86pQ" target="_blank" rel="noopener noreferrer"><img src="https://raw.githubusercontent.com/camoufly/camo-website/main/images/spotify.png" alt="Spotify"></a>
    <a href="https://www.youtube.com/c/camoufly" target="_blank" rel="noopener noreferrer"><img src="https://raw.githubusercontent.com/camoufly/camo-website/main/images/youtube.png" alt="YouTube"></a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ── Tour Data ──
    const TOUR_DATES = [
      {
        date: 'MAR 21',
        venue: 'Electric Studios',
        city: 'Sheffield, UK',
        lat: 53.3811, lng: -1.4701,
        url: 'https://www.skiddle.com/whats-on/Sheffield/Electric-Studios/Faster-Horses-b2b-Paige-Tomlinson-sim0ne-Camoufly--More/42076875/'
      },
      {
        date: 'MAR 25',
        venue: 'Factory Town',
        city: 'Miami, US',
        lat: 25.7617, lng: -80.1918,
        url: 'https://dice.fm/bundles/factory-town-music-week-2026-2x86'
      },
      {
        date: 'MAR 27',
        venue: 'Magazzini Generali (+ Four Tet)',
        city: 'Milano, IT',
        lat: 45.4408, lng: 9.1850,
        url: 'https://dice.fm/event/yonyba--four-tet-milano-27th-mar-magazzini-generali-milano-tickets'
      },
      {
        date: 'APR 8',
        venue: 'La Nau',
        city: 'Barcelona, ES',
        lat: 41.3874, lng: 2.1686,
        url: 'https://ra.co/events/2295130'
      },
      {
        date: 'APR 9',
        venue: 'Berlin Club',
        city: 'Madrid, ES',
        lat: 40.4168, lng: -3.7038,
        url: 'https://tickets.berlinclub.es/en/events/camoufly-en-microdosis'
      },
      {
        date: 'APR 24',
        venue: 'Hiroshima Mon Amour',
        city: 'Torino, IT',
        lat: 45.0903, lng: 7.6615,
        url: 'https://ticket.hiroshimamonamour.org/it/hiroshima-mon-amour/eventi/NH44'
      },
      {
        date: 'MAY 15',
        venue: 'Gemini Festival',
        city: 'Bologna, IT',
        lat: 44.4949, lng: 11.3426,
        url: 'https://geminifestival.com/#tickets'
      },
      {
        date: 'MAY 16',
        venue: 'Invincible Festival',
        city: 'Roma, IT',
        lat: 41.9028, lng: 12.4964,
        url: 'https://xceed.me/en/roma/event/invincible-festival-sab-16-maggio/213253/channel/invincibile-festival'
      }
    ];

    // ── Globals ──
    let scene, camera, renderer, globe, pinGroup;
    let raycaster, mouse;
    let isDragging = false;
    let previousMouse = { x: 0, y: 0 };
    let rotationVelocity = { x: 0, y: 0 };
    let targetRotation = { x: 0.3, y: -0.2 };
    let autoRotate = true;
    let hoveredPin = null;
    let pinMeshes = [];
    const tooltip = document.getElementById('tooltip');

    // ── Coordinate conversion ──
    function latLngToVector3(lat, lng, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lng + 180) * (Math.PI / 180);
      return new THREE.Vector3(
        -(radius * Math.sin(phi) * Math.cos(theta)),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ── Build the scene ──
    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 4.2;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 1);
      document.getElementById('globe-container').appendChild(renderer.domElement);

      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);
      const directional = new THREE.DirectionalLight(0xffffff, 0.8);
      directional.position.set(5, 3, 5);
      scene.add(directional);

      // Globe group
      globe = new THREE.Group();
      scene.add(globe);

      // Ocean sphere (dark)
      const oceanGeo = new THREE.SphereGeometry(1.5, 64, 64);
      const oceanMat = new THREE.MeshPhongMaterial({
        color: 0x0a0a0a,
        shininess: 30,
        transparent: false
      });
      const ocean = new THREE.Mesh(oceanGeo, oceanMat);
      globe.add(ocean);

      // Atmosphere glow
      const glowGeo = new THREE.SphereGeometry(1.55, 64, 64);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x222222,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide
      });
      globe.add(new THREE.Mesh(glowGeo, glowMat));

      // Graticule (subtle grid lines)
      const graticuleLines = new THREE.Group();
      const lineMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a, transparent: true, opacity: 0.5 });

      // Latitude lines
      for (let lat = -80; lat <= 80; lat += 20) {
        const pts = [];
        for (let lng = -180; lng <= 180; lng += 2) {
          pts.push(latLngToVector3(lat, lng, 1.502));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        graticuleLines.add(new THREE.Line(geo, lineMat));
      }

      // Longitude lines
      for (let lng = -180; lng < 180; lng += 20) {
        const pts = [];
        for (let lat = -90; lat <= 90; lat += 2) {
          pts.push(latLngToVector3(lat, lng, 1.502));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        graticuleLines.add(new THREE.Line(geo, lineMat));
      }
      globe.add(graticuleLines);

      // Pin group
      pinGroup = new THREE.Group();
      globe.add(pinGroup);

      // Load GeoJSON and create land
      loadGeoJSON();

      // Create pins
      createPins();

      // Build sidebar date list
      buildDateList();

      // Raycaster
      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      // Set initial rotation to center on Europe
      globe.rotation.x = 0.3;
      globe.rotation.y = -0.2;

      // Events
      window.addEventListener('resize', onResize);
      renderer.domElement.addEventListener('mousedown', onMouseDown);
      renderer.domElement.addEventListener('mousemove', onMouseMove);
      renderer.domElement.addEventListener('mouseup', onMouseUp);
      renderer.domElement.addEventListener('mouseleave', onMouseUp);
      renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
      renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
      renderer.domElement.addEventListener('touchend', onTouchEnd);
      renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

      animate();
    }

    // ── GeoJSON Land ──
    function loadGeoJSON() {
      fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_land.geojson')
        .then(r => r.json())
        .then(data => {
          const landMat = new THREE.LineBasicMaterial({ color: 0xd0d0d0, transparent: true, opacity: 0.85 });
          const fillMat = new THREE.MeshPhongMaterial({
            color: 0xe8e8e8,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide,
            depthWrite: false
          });

          data.features.forEach(feature => {
            const geom = feature.geometry;
            const coords = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;

            coords.forEach(polygon => {
              polygon.forEach(ring => {
                const pts = ring.map(c => latLngToVector3(c[1], c[0], 1.503));
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                globe.add(new THREE.Line(geo, landMat));
              });
            });
          });

          document.getElementById('loading').classList.add('hidden');
        })
        .catch(() => {
          // Fallback: show globe without land outlines
          document.getElementById('loading').classList.add('hidden');
        });
    }

    // ── Pins ──
    function createPins() {
      TOUR_DATES.forEach((td, i) => {
        const pos = latLngToVector3(td.lat, td.lng, 1.51);

        // Pin stem
        const stemGeo = new THREE.CylinderGeometry(0.004, 0.004, 0.08, 8);
        const stemMat = new THREE.MeshBasicMaterial({ color: 0xe74c3c });
        const stem = new THREE.Mesh(stemGeo, stemMat);

        // Pin head
        const headGeo = new THREE.SphereGeometry(0.022, 16, 16);
        const headMat = new THREE.MeshPhongMaterial({
          color: 0xe74c3c,
          emissive: 0xe74c3c,
          emissiveIntensity: 0.3,
          shininess: 80
        });
        const head = new THREE.Mesh(headGeo, headMat);

        // Pulse ring
        const ringGeo = new THREE.RingGeometry(0.025, 0.035, 32);
        const ringMat = new THREE.MeshBasicMaterial({
          color: 0xe74c3c,
          transparent: true,
          opacity: 0.4,
          side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);

        // Pin group
        const pin = new THREE.Group();
        pin.add(stem);
        pin.add(head);
        pin.add(ring);

        // Orient pin to stand on globe surface
        const normal = pos.clone().normalize();
        pin.position.copy(pos);
        pin.lookAt(normal.multiplyScalar(3).add(pos));

        // Offset stem and head
        stem.position.set(0, 0, 0.04);
        head.position.set(0, 0, 0.08);
        ring.position.set(0, 0, 0.005);

        pin.userData = { index: i, ...td };
        pinGroup.add(pin);
        pinMeshes.push(head);

        // Store refs for animation
        head.userData = { ring, index: i, originalScale: 1 };
      });
    }

    // ── Sidebar date list ──
    function buildDateList() {
      const list = document.getElementById('dateList');
      TOUR_DATES.forEach((td, i) => {
        const li = document.createElement('li');
        li.textContent = `${td.date} — ${td.city}`;
        li.addEventListener('click', () => flyToPin(i));
        li.addEventListener('mouseenter', () => highlightPin(i));
        li.addEventListener('mouseleave', () => unhighlightPin(i));
        list.appendChild(li);
      });
    }

    // ── Fly to pin ──
    function flyToPin(index) {
      const td = TOUR_DATES[index];
      const target = latLngToVector3(td.lat, td.lng, 1.51);

      // Calculate target rotation
      const phi = (90 - td.lat) * Math.PI / 180;
      const theta = (td.lng + 180) * Math.PI / 180;

      autoRotate = false;
      setTimeout(() => { autoRotate = true; }, 4000);

      // Animate rotation
      const startX = globe.rotation.x;
      const startY = globe.rotation.y;
      const endX = -(phi - Math.PI / 2);
      const endY = -(theta - Math.PI);

      const duration = 1200;
      const startTime = Date.now();

      function animateFly() {
        const elapsed = Date.now() - startTime;
        const t = Math.min(elapsed / duration, 1);
        const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        globe.rotation.x = startX + (endX - startX) * ease;
        globe.rotation.y = startY + (endY - startY) * ease;

        if (t < 1) requestAnimationFrame(animateFly);
        else showTooltipForPin(index);
      }
      animateFly();
    }

    function highlightPin(index) {
      const head = pinMeshes[index];
      if (head) {
        head.scale.set(1.5, 1.5, 1.5);
        head.material.emissiveIntensity = 0.8;
      }
      // Highlight sidebar
      const items = document.querySelectorAll('#dateList li');
      items.forEach((li, i) => li.classList.toggle('active', i === index));
    }

    function unhighlightPin(index) {
      const head = pinMeshes[index];
      if (head) {
        head.scale.set(1, 1, 1);
        head.material.emissiveIntensity = 0.3;
      }
      const items = document.querySelectorAll('#dateList li');
      items[index]?.classList.remove('active');
    }

    // ── Tooltip ──
    function showTooltipForPin(index) {
      const td = TOUR_DATES[index];
      document.getElementById('ttDate').textContent = td.date;
      document.getElementById('ttVenue').textContent = td.venue;
      document.getElementById('ttCity').textContent = td.city;
      document.getElementById('ttBtn').href = td.url;

      // Position tooltip at screen center-ish
      tooltip.style.left = (window.innerWidth / 2 - 110) + 'px';
      tooltip.style.top = (window.innerHeight / 2 - 80) + 'px';
      tooltip.classList.add('visible');
    }

    function updateTooltipPosition() {
      if (hoveredPin === null) return;
      const td = TOUR_DATES[hoveredPin];
      const pos = latLngToVector3(td.lat, td.lng, 1.58);
      pos.applyMatrix4(globe.matrixWorld);

      const screenPos = pos.clone().project(camera);
      const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

      // Check if pin is on front side of globe
      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      const pinWorldPos = latLngToVector3(td.lat, td.lng, 1.51);
      pinWorldPos.applyMatrix4(globe.matrixWorld);
      const toPin = pinWorldPos.clone().sub(camera.position).normalize();
      const dot = camDir.dot(toPin);

      if (dot > 0 && screenPos.z < 1) {
        tooltip.style.left = (x + 15) + 'px';
        tooltip.style.top = (y - 50) + 'px';
      } else {
        tooltip.classList.remove('visible');
        hoveredPin = null;
      }
    }

    // ── Interaction ──
    function onMouseDown(e) {
      isDragging = true;
      autoRotate = false;
      previousMouse.x = e.clientX;
      previousMouse.y = e.clientY;
      rotationVelocity = { x: 0, y: 0 };
    }

    function onMouseMove(e) {
      // Update mouse for raycasting
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      if (isDragging) {
        const dx = e.clientX - previousMouse.x;
        const dy = e.clientY - previousMouse.y;
        globe.rotation.y += dx * 0.005;
        globe.rotation.x += dy * 0.005;
        globe.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, globe.rotation.x));
        rotationVelocity.x = dy * 0.005;
        rotationVelocity.y = dx * 0.005;
        previousMouse.x = e.clientX;
        previousMouse.y = e.clientY;
        return;
      }

      // Raycast for pin hover
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(pinMeshes);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const idx = hit.userData.index;
        if (hoveredPin !== idx) {
          if (hoveredPin !== null) unhighlightPin(hoveredPin);
          hoveredPin = idx;
          highlightPin(idx);
          showTooltipForPin(idx);
          renderer.domElement.style.cursor = 'pointer';
        }
        updateTooltipPosition();
      } else {
        if (hoveredPin !== null) {
          unhighlightPin(hoveredPin);
          hoveredPin = null;
          tooltip.classList.remove('visible');
          renderer.domElement.style.cursor = 'grab';
        }
      }
    }

    function onMouseUp() {
      isDragging = false;
      setTimeout(() => { autoRotate = true; }, 2000);
    }

    // Touch
    let touchStart = { x: 0, y: 0 };
    function onTouchStart(e) {
      if (e.touches.length === 1) {
        isDragging = true;
        autoRotate = false;
        touchStart.x = e.touches[0].clientX;
        touchStart.y = e.touches[0].clientY;
        previousMouse.x = touchStart.x;
        previousMouse.y = touchStart.y;
      }
    }
    function onTouchMove(e) {
      if (isDragging && e.touches.length === 1) {
        e.preventDefault();
        const dx = e.touches[0].clientX - previousMouse.x;
        const dy = e.touches[0].clientY - previousMouse.y;
        globe.rotation.y += dx * 0.005;
        globe.rotation.x += dy * 0.005;
        globe.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, globe.rotation.x));
        previousMouse.x = e.touches[0].clientX;
        previousMouse.y = e.touches[0].clientY;
      }
    }
    function onTouchEnd() {
      isDragging = false;
      setTimeout(() => { autoRotate = true; }, 2000);
    }

    // Zoom
    function onWheel(e) {
      e.preventDefault();
      camera.position.z += e.deltaY * 0.002;
      camera.position.z = Math.max(2.5, Math.min(8, camera.position.z));
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ── Animation loop ──
    function animate() {
      requestAnimationFrame(animate);

      // Auto rotation
      if (autoRotate && !isDragging) {
        globe.rotation.y += 0.001;
      }

      // Inertia
      if (!isDragging) {
        rotationVelocity.x *= 0.95;
        rotationVelocity.y *= 0.95;
        globe.rotation.x += rotationVelocity.x;
        globe.rotation.y += rotationVelocity.y;
      }

      // Pulse animation for pin rings
      const time = Date.now() * 0.003;
      pinMeshes.forEach((head, i) => {
        const ring = head.userData.ring;
        if (ring) {
          const pulse = 0.3 + Math.sin(time + i * 0.5) * 0.15;
          ring.material.opacity = pulse;
          const s = 1 + Math.sin(time + i * 0.5) * 0.15;
          ring.scale.set(s, s, s);
        }
      });

      // Update tooltip position if hovering
      if (hoveredPin !== null && !isDragging) {
        updateTooltipPosition();
      }

      renderer.render(scene, camera);
    }

    // ── Click on pin (for mobile) ──
    document.getElementById('globe-container').addEventListener('click', (e) => {
      if (isDragging) return;
      const dist = Math.abs(e.clientX - touchStart.x) + Math.abs(e.clientY - touchStart.y);
      if (dist > 10) return; // was a drag

      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(pinMeshes);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.index;
        showTooltipForPin(idx);
      } else {
        tooltip.classList.remove('visible');
      }
    });

    // ── Close tooltip on clicking elsewhere ──
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.pin-tooltip') && !e.target.closest('#globe-container')) {
        tooltip.classList.remove('visible');
        if (hoveredPin !== null) {
          unhighlightPin(hoveredPin);
          hoveredPin = null;
        }
      }
    });

    // ── Init ──
    init();
  </script>
