  <style>
    html, body {
      background: #000 !important;
      color: #fff !important;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      margin: 0;
      cursor: grab;
    }
    body:active { cursor: grabbing; }

    #globe-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .brand {
      position: fixed;
      top: 24px; left: 28px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin: 0; padding: 0;
    }
    .brand .logo { height: 28px; width: auto; filter: brightness(0) invert(1); }
    .brand .logoalt { height: 16px; width: auto; filter: brightness(0) invert(1); opacity: 0.5; }

    .back-link {
      position: fixed;
      top: 28px; right: 28px;
      z-index: 100;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }

    .pin-tooltip {
      position: fixed; z-index: 200;
      pointer-events: none; opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .pin-tooltip.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .pin-tooltip-inner {
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 16px 20px;
      min-width: 220px; max-width: 300px;
    }
    .tt-date { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #e74c3c; margin-bottom: 6px; font-weight: 700; }
    .tt-venue { font-size: 13px; color: #fff; margin-bottom: 2px; font-weight: 600; }
    .tt-city { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 14px; }
    .tt-btn {
      display: inline-block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #fff; background: #e74c3c; border: none; border-radius: 5px;
      padding: 8px 16px; text-decoration: none; cursor: pointer; transition: background 0.2s;
    }
    .tt-btn:hover { background: #c0392b; }

    .date-list {
      position: fixed; bottom: 28px; left: 28px; z-index: 100;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      list-style: none; display: flex; flex-direction: column; gap: 6px; padding: 0; margin: 0;
    }
    .date-list li {
      color: rgba(255,255,255,0.3); cursor: pointer; transition: color 0.3s;
      display: flex; align-items: center; gap: 8px;
    }
    .date-list li:hover, .date-list li.active { color: #fff; }
    .date-list li::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: #e74c3c; display: inline-block; flex-shrink: 0;
    }

    .globe-footer {
      position: fixed; bottom: 24px; right: 28px; z-index: 100;
      display: flex; gap: 12px; align-items: center;
    }
    .globe-footer a {
      opacity: 0.35; transition: opacity 0.3s; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .globe-footer a:hover { opacity: 0.9; }
    .globe-footer a svg { width: 18px; height: 18px; fill: #fff; }

    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 500; display: flex; align-items: center; justify-content: center;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .globe-legal {
      position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%); z-index: 100;
      font-size: 8px; letter-spacing: 0.1em; color: rgba(255,255,255,0.15);
      text-align: center; white-space: nowrap;
    }

    @media (max-width: 640px) {
      .date-list { display: none; }
      .globe-footer { display: none; }
      .brand .logo { height: 22px; }
    }

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>

  <script>
    const TOUR_DATES = [
      { date: 'MAR 21', venue: 'Electric Studios', city: 'Sheffield, UK', lat: 53.3811, lng: -1.4701, url: 'https://www.skiddle.com/whats-on/Sheffield/Electric-Studios/Faster-Horses-b2b-Paige-Tomlinson-sim0ne-Camoufly--More/42076875/' },
      { date: 'MAR 25', venue: 'Factory Town', city: 'Miami, US', lat: 25.7617, lng: -80.1918, url: 'https://dice.fm/bundles/factory-town-music-week-2026-2x86' },
      { date: 'MAR 27', venue: 'Magazzini Generali (+ Four Tet)', city: 'Milano, IT', lat: 45.4408, lng: 9.1850, url: 'https://dice.fm/event/yonyba--four-tet-milano-27th-mar-magazzini-generali-milano-tickets' },
      { date: 'APR 8', venue: 'La Nau', city: 'Barcelona, ES', lat: 41.3874, lng: 2.1686, url: 'https://ra.co/events/2295130' },
      { date: 'APR 9', venue: 'Berlin Club', city: 'Madrid, ES', lat: 40.4168, lng: -3.7038, url: 'https://tickets.berlinclub.es/en/events/camoufly-en-microdosis' },
      { date: 'APR 24', venue: 'Hiroshima Mon Amour', city: 'Torino, IT', lat: 45.0903, lng: 7.6615, url: 'https://ticket.hiroshimamonamour.org/it/hiroshima-mon-amour/eventi/NH44' },
      { date: 'MAY 15', venue: 'Gemini Festival', city: 'Bologna, IT', lat: 44.4949, lng: 11.3426, url: 'https://geminifestival.com/#tickets' },
      { date: 'MAY 16', venue: 'Invincible Festival', city: 'Roma, IT', lat: 41.9028, lng: 12.4964, url: 'https://xceed.me/en/roma/event/invincible-festival-sab-16-maggio/213253/channel/invincibile-festival' }
    ];

    let scene, camera, renderer, globe, pinGroup;
    let raycaster, mouse;
    let isDragging = false;
    let previousMouse = { x: 0, y: 0 };
    let rotationVelocity = { x: 0, y: 0 };
    let autoRotate = true;
    let hoveredPin = null;
    let pinMeshes = [];
    const tooltip = document.getElementById('tooltip');
    const GLOBE_R = 1.5;

    function latLngToVec3(lat, lng, r) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lng + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -(r * Math.sin(phi) * Math.cos(theta)),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
      camera.position.z = 4.2;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 1);
      document.getElementById('globe-container').appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const dir = new THREE.DirectionalLight(0xffffff, 0.6);
      dir.position.set(5, 3, 5);
      scene.add(dir);

      globe = new THREE.Group();
      scene.add(globe);

      // Ocean (dark sphere)
      globe.add(new THREE.Mesh(
        new THREE.SphereGeometry(GLOBE_R, 64, 64),
        new THREE.MeshPhongMaterial({ color: 0x080808, shininess: 5 })
      ));

      // Atmosphere
      globe.add(new THREE.Mesh(
        new THREE.SphereGeometry(GLOBE_R + 0.04, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.06, side: THREE.BackSide })
      ));

      // Graticule
      const gridMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a, transparent: true, opacity: 0.4 });
      for (let lat = -80; lat <= 80; lat += 20) {
        const pts = [];
        for (let lng = -180; lng <= 180; lng += 2) pts.push(latLngToVec3(lat, lng, GLOBE_R + 0.002));
        globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
      }
      for (let lng = -180; lng < 180; lng += 20) {
        const pts = [];
        for (let lat = -90; lat <= 90; lat += 2) pts.push(latLngToVec3(lat, lng, GLOBE_R + 0.002));
        globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
      }

      pinGroup = new THREE.Group();
      globe.add(pinGroup);

      loadLand();
      createPins();
      buildDateList();

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      // Start centered on Europe
      globe.rotation.x = 0.3;
      globe.rotation.y = -0.2;

      addEventListener('resize', onResize);
      const cv = renderer.domElement;
      cv.addEventListener('mousedown', onMouseDown);
      cv.addEventListener('mousemove', onMouseMove);
      cv.addEventListener('mouseup', onMouseUp);
      cv.addEventListener('mouseleave', onMouseLeave);
      cv.addEventListener('touchstart', onTouchStart, { passive: false });
      cv.addEventListener('touchmove', onTouchMove, { passive: false });
      cv.addEventListener('touchend', onTouchEnd);
      cv.addEventListener('wheel', onWheel, { passive: false });

      animate();
    }

    // ── Land ──
    function loadLand() {
      fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_land.geojson')
        .then(r => r.json())
        .then(data => {
          const fillMat = new THREE.MeshBasicMaterial({ color: 0xe0e0e0, side: THREE.DoubleSide, depthWrite: true });
          // No outline — just filled land, no white border

          data.features.forEach(feature => {
            const geom = feature.geometry;
            const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;

            polys.forEach(polygon => {
              const outerRing = polygon[0];

              const flatCoords = [];
              outerRing.forEach(c => { flatCoords.push(c[0], c[1]); });

              const holeIndices = [];
              for (let h = 1; h < polygon.length; h++) {
                holeIndices.push(flatCoords.length / 2);
                polygon[h].forEach(c => { flatCoords.push(c[0], c[1]); });
              }

              const indices = earcut(flatCoords, holeIndices.length ? holeIndices : undefined, 2);
              if (!indices.length) return;

              const positions = new Float32Array((flatCoords.length / 2) * 3);
              for (let i = 0; i < flatCoords.length; i += 2) {
                const v = latLngToVec3(flatCoords[i + 1], flatCoords[i], GLOBE_R + 0.001);
                const idx = (i / 2) * 3;
                positions[idx] = v.x;
                positions[idx + 1] = v.y;
                positions[idx + 2] = v.z;
              }

              const bufGeo = new THREE.BufferGeometry();
              bufGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
              bufGeo.setIndex(indices);
              bufGeo.computeVertexNormals();
              globe.add(new THREE.Mesh(bufGeo, fillMat));
            });
          });

          document.getElementById('loading').classList.add('hidden');
        })
        .catch(() => {
          document.getElementById('loading').classList.add('hidden');
        });
    }

    // ── Pins — stem aligned radially outward ──
    function createPins() {
      TOUR_DATES.forEach((td, i) => {
        const surfacePos = latLngToVec3(td.lat, td.lng, GLOBE_R);
        const normal = surfacePos.clone().normalize();

        // Build pin in a group, then orient the whole group
        const pin = new THREE.Group();

        // Stem: CylinderGeometry is along Y by default
        // We want it along the local "up" (which will be the normal after orientation)
        const stemHeight = 0.10;
        const stemGeo = new THREE.CylinderGeometry(0.004, 0.004, stemHeight, 8);
        const stemMat = new THREE.MeshBasicMaterial({ color: 0xe74c3c });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        stem.position.y = stemHeight / 2; // bottom of stem at origin
        pin.add(stem);

        // Head sphere at top of stem
        const headGeo = new THREE.SphereGeometry(0.025, 16, 16);
        const headMat = new THREE.MeshPhongMaterial({
          color: 0xe74c3c, emissive: 0xe74c3c, emissiveIntensity: 0.35, shininess: 80
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = stemHeight + 0.02;
        pin.add(head);

        // Pulse ring at base
        const ringGeo = new THREE.RingGeometry(0.025, 0.038, 32);
        const ringMat = new THREE.MeshBasicMaterial({
          color: 0xe74c3c, transparent: true, opacity: 0.4, side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2; // flat on the surface
        ring.position.y = 0.002;
        pin.add(ring);

        // Position pin on globe surface
        pin.position.copy(surfacePos);

        // Orient pin so its local Y axis points along the surface normal
        // Default "up" for the pin group is (0,1,0), we need to rotate it to match `normal`
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, normal);
        pin.quaternion.copy(quat);

        pin.userData = { index: i, ...td };
        pinGroup.add(pin);
        pinMeshes.push(head);
        head.userData = { ring, index: i };
      });
    }

    // ── Sidebar ──
    function buildDateList() {
      const list = document.getElementById('dateList');
      TOUR_DATES.forEach((td, i) => {
        const li = document.createElement('li');
        li.textContent = `${td.date} — ${td.city}`;
        li.addEventListener('click', () => flyToPin(i));
        li.addEventListener('mouseenter', () => highlightPin(i));
        li.addEventListener('mouseleave', () => unhighlightPin(i));
        list.appendChild(li);
      });
    }

    // ── Fly to pin — quaternion slerp approach ──
    function flyToPin(index) {
      const td = TOUR_DATES[index];
      autoRotate = false;
      rotationVelocity = { x: 0, y: 0 };

      // We want the pin's position to face the camera (along +Z).
      // The pin is at latLngToVec3(lat, lng, R) in globe-local space.
      // We need to find a globe rotation that puts that point facing +Z (toward camera).
      const pinLocal = latLngToVec3(td.lat, td.lng, GLOBE_R).normalize();

      // Camera looks along -Z, so we want pinLocal to point toward (0, 0, 1) after rotation.
      // That means we need a rotation that takes pinLocal → (0, 0, 1)
      const target = new THREE.Vector3(0, 0, 1);
      const targetQuat = new THREE.Quaternion().setFromUnitVectors(pinLocal, target);

      // Current rotation as quaternion
      const startQuat = new THREE.Quaternion().copy(globe.quaternion);
      // End quaternion: targetQuat applied to current identity
      // We want globe.quaternion = targetQuat (rotating globe so pin faces camera)
      const endQuat = targetQuat.clone();

      const dur = 1200, t0 = Date.now();
      (function tick() {
        const t = Math.min((Date.now() - t0) / dur, 1);
        const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;

        const q = new THREE.Quaternion();
        THREE.Quaternion.slerp(startQuat, endQuat, q, ease);
        globe.quaternion.copy(q);

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          showTooltipForPin(index);
          setTimeout(() => { if (hoveredPin === null && !isDragging) autoRotate = true; }, 4000);
        }
      })();
    }

    function highlightPin(index) {
      const head = pinMeshes[index];
      if (head) { head.scale.set(1.6,1.6,1.6); head.material.emissiveIntensity = 0.9; }
      document.querySelectorAll('#dateList li').forEach((li,i) => li.classList.toggle('active', i===index));
    }

    function unhighlightPin(index) {
      const head = pinMeshes[index];
      if (head) { head.scale.set(1,1,1); head.material.emissiveIntensity = 0.35; }
      document.querySelectorAll('#dateList li')[index]?.classList.remove('active');
    }

    // ── Tooltip ──
    function showTooltipForPin(index) {
      const td = TOUR_DATES[index];
      document.getElementById('ttDate').textContent = td.date;
      document.getElementById('ttVenue').textContent = td.venue;
      document.getElementById('ttCity').textContent = td.city;
      document.getElementById('ttBtn').href = td.url;
      tooltip.classList.add('visible');
      updateTooltipScreenPos(index);
    }

    function updateTooltipScreenPos(index) {
      const td = TOUR_DATES[index];
      const worldPos = latLngToVec3(td.lat, td.lng, GLOBE_R + 0.15);
      worldPos.applyMatrix4(globe.matrixWorld);

      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      const surfaceWorld = latLngToVec3(td.lat, td.lng, GLOBE_R);
      surfaceWorld.applyMatrix4(globe.matrixWorld);
      const toPin = surfaceWorld.clone().sub(camera.position).normalize();
      if (camDir.dot(toPin) <= 0) { tooltip.classList.remove('visible'); return; }

      const ndc = worldPos.clone().project(camera);
      let x = (ndc.x * 0.5 + 0.5) * innerWidth;
      let y = (-ndc.y * 0.5 + 0.5) * innerHeight;
      x = Math.max(10, Math.min(x + 15, innerWidth - 260));
      y = Math.max(10, Math.min(y - 40, innerHeight - 140));
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    // ── Mouse ──
    let dragStartPos = { x: 0, y: 0 };

    function onMouseDown(e) {
      isDragging = true;
      autoRotate = false;
      previousMouse.x = dragStartPos.x = e.clientX;
      previousMouse.y = dragStartPos.y = e.clientY;
      rotationVelocity = { x: 0, y: 0 };
    }

    function onMouseMove(e) {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;

      if (isDragging) {
        const dx = e.clientX - previousMouse.x;
        const dy = e.clientY - previousMouse.y;

        // Apply rotation via quaternion to avoid gimbal lock
        const qx = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * 0.005);
        const qy = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * 0.005);
        globe.quaternion.premultiply(qx);
        globe.quaternion.premultiply(qy);

        rotationVelocity.x = dy * 0.005;
        rotationVelocity.y = dx * 0.005;
        previousMouse.x = e.clientX;
        previousMouse.y = e.clientY;
        tooltip.classList.remove('visible');
        return;
      }

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(pinMeshes);

      if (hits.length > 0) {
        const idx = hits[0].object.userData.index;
        if (hoveredPin !== idx) {
          if (hoveredPin !== null) unhighlightPin(hoveredPin);
          hoveredPin = idx;
          autoRotate = false;
          rotationVelocity = { x: 0, y: 0 };
          highlightPin(idx);
          showTooltipForPin(idx);
          renderer.domElement.style.cursor = 'pointer';
        }
        updateTooltipScreenPos(idx);
      } else if (hoveredPin !== null) {
        unhighlightPin(hoveredPin);
        hoveredPin = null;
        tooltip.classList.remove('visible');
        renderer.domElement.style.cursor = 'grab';
        autoRotate = true;
      }
    }

    function onMouseUp() {
      isDragging = false;
      if (hoveredPin === null) {
        setTimeout(() => { if (hoveredPin === null && !isDragging) autoRotate = true; }, 1500);
      }
    }

    function onMouseLeave() {
      isDragging = false;
      if (hoveredPin === null) {
        setTimeout(() => { if (hoveredPin === null && !isDragging) autoRotate = true; }, 1500);
      }
    }

    // ── Touch ──
    let touchStartPos = { x: 0, y: 0 };
    function onTouchStart(e) {
      if (e.touches.length !== 1) return;
      isDragging = true; autoRotate = false;
      touchStartPos.x = previousMouse.x = e.touches[0].clientX;
      touchStartPos.y = previousMouse.y = e.touches[0].clientY;
    }
    function onTouchMove(e) {
      if (!isDragging || e.touches.length !== 1) return;
      e.preventDefault();
      const dx = e.touches[0].clientX - previousMouse.x;
      const dy = e.touches[0].clientY - previousMouse.y;
      const qx = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * 0.005);
      const qy = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * 0.005);
      globe.quaternion.premultiply(qx);
      globe.quaternion.premultiply(qy);
      previousMouse.x = e.touches[0].clientX;
      previousMouse.y = e.touches[0].clientY;
    }
    function onTouchEnd() {
      isDragging = false;
      setTimeout(() => { if (hoveredPin === null && !isDragging) autoRotate = true; }, 2000);
    }

    function onWheel(e) {
      e.preventDefault();
      camera.position.z = Math.max(2.5, Math.min(8, camera.position.z + e.deltaY * 0.002));
    }

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }

    // ── Tap (mobile) ──
    document.getElementById('globe-container').addEventListener('click', (e) => {
      const dist = Math.abs(e.clientX - (touchStartPos.x||dragStartPos.x))
                 + Math.abs(e.clientY - (touchStartPos.y||dragStartPos.y));
      if (dist > 10) return;

      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(pinMeshes);

      if (hits.length > 0) {
        const idx = hits[0].object.userData.index;
        hoveredPin = idx; autoRotate = false;
        highlightPin(idx); showTooltipForPin(idx);
      } else {
        if (hoveredPin !== null) unhighlightPin(hoveredPin);
        hoveredPin = null;
        tooltip.classList.remove('visible');
        setTimeout(() => { if (hoveredPin === null) autoRotate = true; }, 2000);
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.pin-tooltip') && !e.target.closest('#globe-container')) {
        tooltip.classList.remove('visible');
        if (hoveredPin !== null) { unhighlightPin(hoveredPin); hoveredPin = null; }
        setTimeout(() => { if (hoveredPin === null) autoRotate = true; }, 1500);
      }
    });

    // ── Render loop ──
    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate && !isDragging && hoveredPin === null) {
        const qAutoRot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), 0.0008);
        globe.quaternion.premultiply(qAutoRot);
      }

      if (!isDragging && hoveredPin === null) {
        rotationVelocity.x *= 0.94;
        rotationVelocity.y *= 0.94;
        if (Math.abs(rotationVelocity.x) > 0.00001 || Math.abs(rotationVelocity.y) > 0.00001) {
          const qIx = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), rotationVelocity.x);
          const qIy = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), rotationVelocity.y);
          globe.quaternion.premultiply(qIx);
          globe.quaternion.premultiply(qIy);
        }
      }

      const t = Date.now() * 0.003;
      pinMeshes.forEach((head, i) => {
        const ring = head.userData.ring;
        if (ring) {
          ring.material.opacity = 0.3 + Math.sin(t + i * 0.7) * 0.15;
          const s = 1 + Math.sin(t + i * 0.7) * 0.15;
          ring.scale.set(s, s, s);
        }
      });

      if (hoveredPin !== null) updateTooltipScreenPos(hoveredPin);

      renderer.render(scene, camera);
    }

    init();
  </script>
